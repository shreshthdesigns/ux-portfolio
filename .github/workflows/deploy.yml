name: Deploy to Namecheap

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -p 21098 shreshthdesings.com >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Deploy via rsync over SSH
        run: |
          rsync -avz --delete \
            -e "ssh -p 21098 -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no" \
            ./dist/ shrecvma@shreshthdesings.com:/home/shrecvma/public_html/
